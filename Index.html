<!DOCTYPE html>
<html>
<head>
  <title>Stationing App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    button { font-size: 20px; padding: 10px 20px; }
    #output { font-size: 24px; margin-top: 20px; }
  </style>
</head>
<body>

<h2>Stationing App</h2>

<button onclick="getLocation()">Get My Station</button>

<div id="output">Waiting...</div>

<script>
function getLocation() {
  navigator.geolocation.getCurrentPosition(showPosition);
}

function showPosition(position) {
  document.getElementById("output").innerHTML =
    "Lat: " + position.coords.latitude.toFixed(6) +
    "<br>Lon: " + position.coords.longitude.toFixed(6) +
    "<br>Accuracy: " + position.coords.accuracy.toFixed(1) + " meters";
}
</script>

</body>
</html>
