<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stationing</title>
  <meta name="theme-color" content="#111111" />

  <style>
    @font-face {
      font-family: "AceBruno";
      src: url("BrunoAceSC-Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #111111;
      --card-bg: #1B1B1B;
      --title: #EA9C01;
      --large-text: #B8E8E1;
      --small-text: #1BB69F;
      --dropdown-accent: #106D5F;
      --icon-inactive: #D9D9D9;
      --icon-active: #16927F;
      --note-bg: #E8F8F5;
      --status-bg: #252525;
      --good: #1BB69F;
      --bad: #ff8e8e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px 16px;
    }

    .card {
      width: 100%;
      max-width: 410px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 18px 18px 22px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.42);
    }

    .titleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .title {
      flex: 1;
      text-align: center;
      margin: 0;
      white-space: nowrap;
    }

    .titleText {
      display: inline-block;
      font-family: "AceBruno", Arial, sans-serif;
      font-size: 33px;
      line-height: 1;
      color: var(--title);
      letter-spacing: 0.15px;
      transform: scaleY(1.15);
      transform-origin: center;
    }

    .iconBtn {
      width: 50px;
      height: 50px;
      min-width: 50px;
      min-height: 50px;
      border-radius: 14px;
      border: 2px solid var(--icon-inactive);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }

    .iconBtn:active,
    .cameraBtn:active {
      transform: scale(0.97);
    }

    .iconBtn.active {
      border-color: var(--icon-active);
      box-shadow: 0 0 0 1px rgba(22, 146, 127, 0.2);
    }

    .modeIcon {
      width: 24px;
      height: 24px;
      background-color: var(--icon-inactive);
      display: block;
      transition: background-color 0.15s ease;
      -webkit-mask-position: center;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-size: contain;
      mask-position: center;
      mask-repeat: no-repeat;
      mask-size: contain;
    }

    .iconBtn.active .modeIcon {
      background-color: var(--icon-active);
    }

    .modeIcon.rabbit {
      -webkit-mask-image: url("rabbit.svg");
      mask-image: url("rabbit.svg");
    }

    .modeIcon.snail {
      -webkit-mask-image: url("snail.svg");
      mask-image: url("snail.svg");
    }

    .row {
      margin-bottom: 12px;
    }

    .label {
      color: var(--small-text);
      font-size: 12px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid var(--dropdown-accent);
      border-radius: 18px;
      background: #2A2A2A;
      color: var(--large-text);
      font-size: 17px;
      padding: 17px 46px 17px 16px;
      outline: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--small-text) 50%),
        linear-gradient(135deg, var(--small-text) 50%, transparent 50%);
      background-position:
        calc(100% - 22px) calc(50% - 4px),
        calc(100% - 14px) calc(50% - 4px);
      background-size: 8px 8px, 8px 8px;
      background-repeat: no-repeat;
    }

    .topStats {
      display: grid;
      grid-template-columns: 1.2fr 0.75fr 1fr;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 28px;
      align-items: start;
    }

    .bottomStats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 18px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .stat.left {
      align-items: flex-start;
      text-align: left;
    }

    .stat.center {
      align-items: center;
      text-align: center;
    }

    .stat.sideStat,
    .stat.offsetStat {
      align-items: flex-start;
      text-align: left;
    }

    .bigValue {
      color: var(--large-text);
      font-size: 30px;
      font-weight: bold;
      line-height: 1.08;
      letter-spacing: 0.1px;
      word-break: break-word;
    }

    .mediumValue {
      color: var(--large-text);
      font-size: 17px;
      font-weight: normal;
      line-height: 1.2;
    }

    .noteWrap {
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      min-height: 108px;
      border: none;
      border-radius: 12px;
      background: var(--note-bg);
      color: #4e5b60;
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.35;
      padding: 14px 14px;
      resize: none;
      outline: none;
      display: block;
    }

    textarea::placeholder {
      color: #9d9d9d;
    }

    .cameraWrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .cameraBtn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 2px solid var(--icon-active);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: transform 0.05s ease;
    }

    .cameraIcon {
      width: 22px;
      height: 22px;
      background-color: var(--icon-active);
      display: block;
      -webkit-mask-image: url("camera.svg");
      mask-image: url("camera.svg");
      -webkit-mask-position: center;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-size: contain;
      mask-position: center;
      mask-repeat: no-repeat;
      mask-size: contain;
    }

    .status {
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--status-bg);
      font-size: 14px;
      line-height: 1.35;
      color: var(--large-text);
    }

    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }

    @media (max-width: 390px) {
      .titleText {
        font-size: 30px;
      }

      .iconBtn {
        width: 48px;
        height: 48px;
        min-width: 48px;
        min-height: 48px;
      }

      .modeIcon {
        width: 23px;
        height: 23px;
      }

      .bigValue {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="card" id="captureArea">
    <div class="titleRow">
      <button id="fastModeBtn" class="iconBtn" type="button" aria-label="Fast mode" title="Fast mode">
        <span class="modeIcon rabbit" aria-hidden="true"></span>
      </button>

      <h1 class="title"><span class="titleText">Stationing</span></h1>

      <button id="slowModeBtn" class="iconBtn" type="button" aria-label="Slow mode" title="Slow mode">
        <span class="modeIcon snail" aria-hidden="true"></span>
      </button>
    </div>

    <div class="row">
      <div class="label">Project:</div>
      <select id="projectSelect"></select>
    </div>

    <div class="topStats">
      <div class="stat left">
        <div class="label">Station</div>
        <div id="station" class="bigValue">--+--</div>
      </div>

      <div class="stat sideStat">
        <div class="label">Side</div>
        <div id="side" class="bigValue">--</div>
      </div>

      <div class="stat offsetStat">
        <div class="label">Offset</div>
        <div id="offset" class="bigValue">--.- ft</div>
      </div>
    </div>

    <div class="bottomStats">
      <div class="stat center">
        <div class="label">GPS Accuracy</div>
        <div id="accuracy" class="mediumValue">--</div>
      </div>

      <div class="stat center">
        <div class="label">Smoothing Points</div>
        <div id="smoothingCountDisplay" class="mediumValue">--</div>
      </div>
    </div>

    <div class="noteWrap">
      <textarea id="noteInput" placeholder="Example note"></textarea>
    </div>

    <div class="cameraWrap">
      <button id="captureBtn" class="cameraBtn" type="button" aria-label="Capture app card" title="Capture app card">
        <span class="cameraIcon" aria-hidden="true"></span>
      </button>
    </div>

    <div id="status" class="status good">Loading app...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>

  <script>
    // =========================
    // PROJECT LIST
    // =========================
    const PROJECTS = [
      {
        name: "Project 1",
        file: "project1.geojson",
        startStationFeet: 200
      },
      {
        name: "sidewalk",
        file: "sidewalk.geojson",
        startStationFeet: 0
      },
      {
        name: "FM 3325",
        file: "3616-01-020.geojson",
        startStationFeet: 0
      }
    ];

    // =========================
    // MODE SETTINGS
    // =========================
    const MODES = {
      fast: {
        label: "Fast",
        maxGpsAccuracyMeters: 15,
        smoothingPointCount: 3,
        maxJumpFeet: 120,
        maxSpeedFeetPerSecond: 120,
        maxStationJumpFeet: 150,
        maxOffsetSpikeFeet: 30
      },
      slow: {
        label: "Slow",
        maxGpsAccuracyMeters: 10,
        smoothingPointCount: 7,
        maxJumpFeet: 50,
        maxSpeedFeetPerSecond: 35,
        maxStationJumpFeet: 60,
        maxOffsetSpikeFeet: 15
      }
    };

    const PROJECT_STORAGE_KEY = "stationingAppSelectedProjectIndex";
    const MODE_STORAGE_KEY = "stationingAppTrackingMode";
    const GPS_PROCESS_INTERVAL_MS = 650;
    const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    // =========================
    // APP STATE
    // =========================
    let currentProjectIndex = 0;
    let currentMode = "fast";
    let centerline = null;
    let watchId = null;

    let recentGpsPoints = [];
    let lastAcceptedRawPoint = null;
    let lastAcceptedSnappedResult = null;
    let lastProcessedTimestamp = 0;

    let html2canvasLoader = null;

    // =========================
    // DOM CACHE
    // =========================
    const stationEl = document.getElementById("station");
    const offsetEl = document.getElementById("offset");
    const sideEl = document.getElementById("side");
    const accuracyEl = document.getElementById("accuracy");
    const smoothingCountEl = document.getElementById("smoothingCountDisplay");
    const statusEl = document.getElementById("status");
    const projectSelectEl = document.getElementById("projectSelect");
    const fastModeBtnEl = document.getElementById("fastModeBtn");
    const slowModeBtnEl = document.getElementById("slowModeBtn");
    const captureBtnEl = document.getElementById("captureBtn");
    const captureAreaEl = document.getElementById("captureArea");

    // =========================
    // UI HELPERS
    // =========================
    function setStatus(message, isGood = true) {
      statusEl.textContent = message;
      statusEl.classList.toggle("good", !!isGood);
      statusEl.classList.toggle("bad", !isGood);
    }

    function formatStation(feet) {
      const rounded = Math.round(feet);
      const staHundreds = Math.floor(rounded / 100);
      const staRemainder = rounded % 100;
      return `${staHundreds.toString().padStart(2, "0")} + ${staRemainder.toString().padStart(2, "0")}`;
    }

    function metersToFeet(meters) {
      return meters * 3.28084;
    }

    function getCurrentProject() {
      return PROJECTS[currentProjectIndex];
    }

    function getCurrentModeSettings() {
      return MODES[currentMode];
    }

    function updateModeButtonStyles() {
      fastModeBtnEl.classList.toggle("active", currentMode === "fast");
      slowModeBtnEl.classList.toggle("active", currentMode === "slow");
    }

    function updateProjectInfoDisplay() {
      const modeSettings = getCurrentModeSettings();
      smoothingCountEl.textContent = `${recentGpsPoints.length}/${modeSettings.smoothingPointCount}`;
    }

    function resetDisplayedValues() {
      stationEl.textContent = "--+--";
      offsetEl.textContent = "--.- ft";
      sideEl.textContent = "--";
      accuracyEl.textContent = "--";
      updateProjectInfoDisplay();
    }

    function resetTrackingBuffers() {
      recentGpsPoints = [];
      lastAcceptedRawPoint = null;
      lastAcceptedSnappedResult = null;
      lastProcessedTimestamp = 0;
      updateProjectInfoDisplay();
    }

    function setMode(modeName) {
      if (!MODES[modeName]) return;

      currentMode = modeName;
      localStorage.setItem(MODE_STORAGE_KEY, currentMode);

      resetTrackingBuffers();
      updateModeButtonStyles();
      updateProjectInfoDisplay();

      if (centerline) {
        setStatus(`Switched to ${MODES[currentMode].label} mode. Waiting for fresh GPS points...`, true);
      }
    }

    // =========================
    // GEOMETRY HELPERS
    // =========================
    function getSegmentForSnap(lineCoords, snappedIndex) {
      if (lineCoords.length < 2) return null;

      if (snappedIndex >= 0 && snappedIndex < lineCoords.length - 1) {
        return [lineCoords[snappedIndex], lineCoords[snappedIndex + 1]];
      }

      if (snappedIndex >= lineCoords.length - 1) {
        return [lineCoords[lineCoords.length - 2], lineCoords[lineCoords.length - 1]];
      }

      return [lineCoords[0], lineCoords[1]];
    }

    function getSideOfSegment(segmentStart, segmentEnd, pointCoord) {
      const avgLat = ((segmentStart[1] + segmentEnd[1] + pointCoord[1]) / 3) * Math.PI / 180;
      const cosLat = Math.cos(avgLat);

      const ax = segmentStart[0] * cosLat;
      const ay = segmentStart[1];
      const bx = segmentEnd[0] * cosLat;
      const by = segmentEnd[1];
      const px = pointCoord[0] * cosLat;
      const py = pointCoord[1];

      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;

      const cross = (abx * apy) - (aby * apx);

      if (Math.abs(cross) < 1e-12) return "ON";
      return cross > 0 ? "LT" : "RT";
    }

    function getSideText(centerlineFeature, snapped, originalCoord) {
      let sideText = "--";

      if (centerlineFeature.geometry.type === "LineString") {
        const lineCoords = centerlineFeature.geometry.coordinates;
        const snappedIndex = snapped.properties.index ?? 0;
        const segment = getSegmentForSnap(lineCoords, snappedIndex);

        if (segment) {
          sideText = getSideOfSegment(segment[0], segment[1], originalCoord);
        }
      } else if (centerlineFeature.geometry.type === "MultiLineString") {
        const multiIndex = snapped.properties.multiFeatureIndex ?? 0;
        const lineCoords = centerlineFeature.geometry.coordinates[multiIndex];
        const snappedIndex = snapped.properties.index ?? 0;
        const segment = getSegmentForSnap(lineCoords, snappedIndex);

        if (segment) {
          sideText = getSideOfSegment(segment[0], segment[1], originalCoord);
        }
      }

      return sideText;
    }

    // =========================
    // SMOOTHING
    // =========================
    function addGpsPointToBuffer(pointData) {
      const modeSettings = getCurrentModeSettings();
      recentGpsPoints.push(pointData);

      if (recentGpsPoints.length > modeSettings.smoothingPointCount) {
        recentGpsPoints.shift();
      }

      updateProjectInfoDisplay();
    }

    function getSmoothedCoordinate() {
      if (recentGpsPoints.length === 0) return null;

      let weightedLonSum = 0;
      let weightedLatSum = 0;
      let totalWeight = 0;

      for (const pointData of recentGpsPoints) {
        const weight = 1 / Math.max(pointData.accuracyMeters, 0.1);
        weightedLonSum += pointData.lon * weight;
        weightedLatSum += pointData.lat * weight;
        totalWeight += weight;
      }

      return [
        weightedLonSum / totalWeight,
        weightedLatSum / totalWeight
      ];
    }

    // =========================
    // LOAD CENTERLINE
    // =========================
    async function loadCenterlineForCurrentProject() {
      const project = getCurrentProject();

      setStatus(`Loading ${project.name}...`, true);
      resetDisplayedValues();
      updateProjectInfoDisplay();

      const response = await fetch(project.file, { cache: "no-store" });

      if (!response.ok) {
        throw new Error(`Could not load ${project.file}`);
      }

      const data = await response.json();

      if (data.type === "FeatureCollection") {
        const lineFeature = data.features.find(f =>
          f.geometry &&
          (f.geometry.type === "LineString" || f.geometry.type === "MultiLineString")
        );

        if (!lineFeature) {
          throw new Error(`No LineString or MultiLineString found in ${project.file}`);
        }

        centerline = lineFeature;
        resetTrackingBuffers();
        return;
      }

      if (
        data.type === "Feature" &&
        data.geometry &&
        (data.geometry.type === "LineString" || data.geometry.type === "MultiLineString")
      ) {
        centerline = data;
        resetTrackingBuffers();
        return;
      }

      throw new Error(`${project.file} must contain a LineString or MultiLineString`);
    }

    // =========================
    // GPS FILTERING
    // =========================
    function rawPointShouldBeRejected(newPoint) {
      const modeSettings = getCurrentModeSettings();

      if (newPoint.accuracyMeters > modeSettings.maxGpsAccuracyMeters) {
        setStatus(
          `Waiting for better GPS accuracy. Current: ${metersToFeet(newPoint.accuracyMeters).toFixed(1)} ft`,
          false
        );
        return true;
      }

      if (!lastAcceptedRawPoint) return false;

      const previousPoint = turf.point([lastAcceptedRawPoint.lon, lastAcceptedRawPoint.lat]);
      const currentPoint = turf.point([newPoint.lon, newPoint.lat]);

      const distanceFeet = turf.distance(previousPoint, currentPoint, { units: "kilometers" }) * 3280.84;
      const elapsedSeconds = Math.max((newPoint.timestamp - lastAcceptedRawPoint.timestamp) / 1000, 0.001);
      const speedFeetPerSecond = distanceFeet / elapsedSeconds;

      if (distanceFeet > modeSettings.maxJumpFeet) {
        setStatus(`Rejected GPS outlier: jump too large (${distanceFeet.toFixed(1)} ft).`, false);
        return true;
      }

      if (speedFeetPerSecond > modeSettings.maxSpeedFeetPerSecond) {
        setStatus(`Rejected GPS outlier: speed too high (${speedFeetPerSecond.toFixed(1)} ft/s).`, false);
        return true;
      }

      return false;
    }

    function snappedResultShouldBeRejected(stationFeet, offsetFeet) {
      const modeSettings = getCurrentModeSettings();

      if (!lastAcceptedSnappedResult) return false;

      const stationJumpFeet = Math.abs(stationFeet - lastAcceptedSnappedResult.stationFeet);
      const offsetSpikeFeet = Math.abs(offsetFeet - lastAcceptedSnappedResult.offsetFeet);

      if (stationJumpFeet > modeSettings.maxStationJumpFeet) {
        setStatus(`Rejected snapped outlier: station jump too large (${stationJumpFeet.toFixed(1)} ft).`, false);
        return true;
      }

      if (offsetSpikeFeet > modeSettings.maxOffsetSpikeFeet) {
        setStatus(`Rejected snapped outlier: offset spike too large (${offsetSpikeFeet.toFixed(1)} ft).`, false);
        return true;
      }

      return false;
    }

    // =========================
    // GPS UPDATE
    // =========================
    function updatePosition(position) {
      const now = Date.now();
      if (now - lastProcessedTimestamp < GPS_PROCESS_INTERVAL_MS) {
        return;
      }
      lastProcessedTimestamp = now;

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracyMeters = position.coords.accuracy;
      const timestamp = position.timestamp || now;

      accuracyEl.textContent = `${metersToFeet(accuracyMeters).toFixed(1)} ft`;

      if (!centerline) {
        setStatus("Centerline not loaded yet.", false);
        return;
      }

      const rawPointData = {
        lat,
        lon,
        accuracyMeters,
        timestamp
      };

      if (rawPointShouldBeRejected(rawPointData)) {
        return;
      }

      lastAcceptedRawPoint = rawPointData;
      addGpsPointToBuffer(rawPointData);

      const smoothedCoord = getSmoothedCoordinate();
      if (!smoothedCoord) {
        setStatus("Waiting for enough GPS points...", false);
        return;
      }

      try {
        const project = getCurrentProject();
        const smoothedPoint = turf.point(smoothedCoord);

        const snapped = turf.nearestPointOnLine(centerline, smoothedPoint, { units: "kilometers" });

        const stationAlongLineFeet = turf.convertLength(
          snapped.properties.location,
          "kilometers",
          "feet"
        );

        const displayedStationFeet = project.startStationFeet + stationAlongLineFeet;

        const offsetFeet = turf.convertLength(
          snapped.properties.dist,
          "kilometers",
          "feet"
        );

        if (snappedResultShouldBeRejected(displayedStationFeet, offsetFeet)) {
          return;
        }

        const sideText = getSideText(centerline, snapped, [smoothedCoord[0], smoothedCoord[1]]);

        lastAcceptedSnappedResult = {
          stationFeet: displayedStationFeet,
          offsetFeet
        };

        stationEl.textContent = formatStation(displayedStationFeet);
        offsetEl.textContent = `${offsetFeet.toFixed(2)} ft`;
        sideEl.textContent = sideText;
        updateProjectInfoDisplay();

        setStatus(`GPS locked on ${project.name} (${MODES[currentMode].label} mode).`, true);
      } catch (err) {
        setStatus(`Geometry error: ${err.message}`, false);
      }
    }

    function handleGpsError(error) {
      setStatus(`GPS error: ${error.message}`, false);
    }

    function startGpsWatch() {
      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported on this device/browser.", false);
        return;
      }

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      watchId = navigator.geolocation.watchPosition(updatePosition, handleGpsError, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });
    }

    // =========================
    // SCREEN CAPTURE
    // =========================
    function loadHtml2CanvasIfNeeded() {
      if (window.html2canvas) {
        return Promise.resolve(window.html2canvas);
      }

      if (html2canvasLoader) {
        return html2canvasLoader;
      }

      html2canvasLoader = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
        script.onload = () => resolve(window.html2canvas);
        script.onerror = () => reject(new Error("Could not load html2canvas."));
        document.head.appendChild(script);
      });

      return html2canvasLoader;
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("Could not create PNG file."));
        }, "image/png");
      });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    async function captureCard() {
      const originalAria = captureBtnEl.getAttribute("aria-label");

      try {
        captureBtnEl.disabled = true;
        captureBtnEl.setAttribute("aria-label", "Capturing");

        const html2canvas = await loadHtml2CanvasIfNeeded();

        const canvas = await html2canvas(captureAreaEl, {
          backgroundColor: "#1B1B1B",
          scale: Math.min(window.devicePixelRatio || 1, 2),
          useCORS: true,
          logging: false
        });

        if (IS_IOS) {
          const dataUrl = canvas.toDataURL("image/png");
          const win = window.open("", "_blank");

          if (!win) {
            throw new Error("Popup blocked while opening capture.");
          }

          win.document.write(`
            <!DOCTYPE html>
            <html>
              <head>
                <title>Stationing Capture</title>
                <meta name="viewport" content="width=device-width, initial-scale=1" />
                <style>
                  html, body {
                    margin: 0;
                    padding: 0;
                    background: #111;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    min-height: 100%;
                  }
                  img {
                    max-width: 100%;
                    height: auto;
                    display: block;
                  }
                </style>
              </head>
              <body>
                <img src="${dataUrl}" alt="Stationing capture" />
              </body>
            </html>
          `);
          win.document.close();

          setStatus("Capture opened in a new tab.", true);
          return;
        }

        const blob = await canvasToBlob(canvas);
        downloadBlob(blob, "stationing-card.png");
        setStatus("Card captured and downloaded.", true);
      } catch (err) {
        setStatus(`Capture failed: ${err.message}`, false);
      } finally {
        captureBtnEl.disabled = false;
        captureBtnEl.setAttribute("aria-label", originalAria || "Capture app card");
      }
    }

    // =========================
    // PROJECT DROPDOWN
    // =========================
    function buildProjectDropdown() {
      projectSelectEl.innerHTML = "";

      PROJECTS.forEach((project, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = project.name;
        projectSelectEl.appendChild(option);
      });

      if (currentProjectIndex < 0 || currentProjectIndex >= PROJECTS.length) {
        currentProjectIndex = 0;
      }

      projectSelectEl.value = String(currentProjectIndex);

      projectSelectEl.addEventListener("change", async function () {
        currentProjectIndex = Number(this.value);
        localStorage.setItem(PROJECT_STORAGE_KEY, String(currentProjectIndex));

        try {
          centerline = null;
          resetTrackingBuffers();
          resetDisplayedValues();
          updateProjectInfoDisplay();
          await loadCenterlineForCurrentProject();
          setStatus(`Loaded ${getCurrentProject().name}. Waiting for GPS update...`, true);
        } catch (err) {
          centerline = null;
          resetDisplayedValues();
          setStatus(err.message, false);
        }
      });
    }

    // =========================
    // APP START
    // =========================
    async function startApp() {
      try {
        if (!Array.isArray(PROJECTS) || PROJECTS.length === 0) {
          throw new Error("No projects configured in the PROJECTS list.");
        }

        const savedProjectIndex = Number(localStorage.getItem(PROJECT_STORAGE_KEY));
        if (!Number.isNaN(savedProjectIndex) && savedProjectIndex >= 0 && savedProjectIndex < PROJECTS.length) {
          currentProjectIndex = savedProjectIndex;
        }

        const savedMode = localStorage.getItem(MODE_STORAGE_KEY);
        if (savedMode && MODES[savedMode]) {
          currentMode = savedMode;
        }

        fastModeBtnEl.addEventListener("click", () => setMode("fast"));
        slowModeBtnEl.addEventListener("click", () => setMode("slow"));
        captureBtnEl.addEventListener("click", captureCard);

        updateModeButtonStyles();
        buildProjectDropdown();
        updateProjectInfoDisplay();
        await loadCenterlineForCurrentProject();
        startGpsWatch();
        setStatus("App ready. Waiting for GPS...", true);
      } catch (err) {
        setStatus(err.message, false);
      }
    }

    startApp();
  </script>
</body>
</html>
