<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stationing App</title>
  <meta name="theme-color" content="#111111" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #1b1b1b;
      border-radius: 16px;
      padding: 20px;
      box-sizing: border-box;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 18px 0;
      font-size: 24px;
      text-align: center;
    }

    .row {
      margin-bottom: 14px;
    }

    .label {
      font-size: 13px;
      color: #bdbdbd;
      margin-bottom: 4px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.2;
      word-break: break-word;
    }

    .small {
      font-size: 16px;
      font-weight: normal;
    }

    .status {
      margin-top: 18px;
      padding: 10px 12px;
      background: #2a2a2a;
      border-radius: 10px;
      font-size: 14px;
      color: #d7d7d7;
    }

    .good { color: #7CFC98; }
    .bad { color: #ff8e8e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Stationing App</h1>

    <div class="row">
      <div class="label">Station</div>
      <div id="station" class="value">--+--</div>
    </div>

    <div class="row">
      <div class="label">Offset</div>
      <div id="offset" class="value">--.- ft</div>
    </div>

    <div class="row">
      <div class="label">Side</div>
      <div id="side" class="value small">--</div>
    </div>

    <div class="row">
      <div class="label">Start Station</div>
      <div id="startStationDisplay" class="value small">--+--</div>
    </div>

    <div class="row">
      <div class="label">GPS Accuracy</div>
      <div id="accuracy" class="value small">--</div>
    </div>

    <div class="row">
      <div class="label">Coordinates</div>
      <div id="coords" class="value small">--</div>
    </div>

    <div id="status" class="status">Loading centerline...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
  <script>
    // =========================
    // SETTINGS
    // =========================
    const GEOJSON_FILE = "project1.geojson";
    const MAX_GPS_ACCURACY_METERS = 10;

    // CHANGE THIS TO YOUR PROJECT START STATION
    // Example:
    // 0+00     = 0
    // 10+00    = 1000
    // 1663+00  = 166300
    // 1663+45  = 166345
    const START_STATION_FEET = 80065;

    // =========================
    // APP STATE
    // =========================
    let centerline = null;

    // =========================
    // UI HELPERS
    // =========================
    function setStatus(message, isGood = true) {
      const el = document.getElementById("status");
      el.innerHTML = isGood
        ? `<span class="good">${message}</span>`
        : `<span class="bad">${message}</span>`;
    }

    function formatStation(feet) {
      const rounded = Math.round(feet);
      const staHundreds = Math.floor(rounded / 100);
      const staRemainder = rounded % 100;
      return `${staHundreds}+${staRemainder.toString().padStart(2, "0")}`;
    }

    // =========================
    // GEOMETRY HELPERS
    // =========================
    function getSegmentForSnap(lineCoords, snappedIndex) {
      if (lineCoords.length < 2) return null;

      if (snappedIndex >= 0 && snappedIndex < lineCoords.length - 1) {
        return [lineCoords[snappedIndex], lineCoords[snappedIndex + 1]];
      }

      if (snappedIndex >= lineCoords.length - 1) {
        return [lineCoords[lineCoords.length - 2], lineCoords[lineCoords.length - 1]];
      }

      return [lineCoords[0], lineCoords[1]];
    }

    function getSideOfSegment(segmentStart, segmentEnd, pointCoord) {
      const avgLat = ((segmentStart[1] + segmentEnd[1] + pointCoord[1]) / 3) * Math.PI / 180;
      const cosLat = Math.cos(avgLat);

      const ax = segmentStart[0] * cosLat;
      const ay = segmentStart[1];
      const bx = segmentEnd[0] * cosLat;
      const by = segmentEnd[1];
      const px = pointCoord[0] * cosLat;
      const py = pointCoord[1];

      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;

      const cross = (abx * apy) - (aby * apx);

      if (Math.abs(cross) < 1e-12) return "On Line";

      return cross > 0 ? "LT" : "RT";
    }

    async function loadCenterline() {
      const response = await fetch(GEOJSON_FILE);
      if (!response.ok) {
        throw new Error(`Could not load ${GEOJSON_FILE}`);
      }

      const data = await response.json();

      if (data.type === "FeatureCollection") {
        const lineFeature = data.features.find(f =>
          f.geometry &&
          (f.geometry.type === "LineString" || f.geometry.type === "MultiLineString")
        );

        if (!lineFeature) {
          throw new Error("No LineString or MultiLineString found in GeoJSON.");
        }

        return lineFeature;
      }

      if (
        data.type === "Feature" &&
        data.geometry &&
        (data.geometry.type === "LineString" || data.geometry.type === "MultiLineString")
      ) {
        return data;
      }

      throw new Error("GeoJSON must contain a LineString or MultiLineString.");
    }

    function updatePosition(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      document.getElementById("accuracy").textContent = `${accuracy.toFixed(1)} m`;
      document.getElementById("coords").textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
      document.getElementById("startStationDisplay").textContent = formatStation(START_STATION_FEET);

      if (accuracy > MAX_GPS_ACCURACY_METERS) {
        setStatus(`Waiting for better GPS accuracy. Current: ${accuracy.toFixed(1)} m`, false);
        return;
      }

      if (!centerline) {
        setStatus("Centerline not loaded yet.", false);
        return;
      }

      try {
        const gpsPoint = turf.point([lon, lat]);
        const snapped = turf.nearestPointOnLine(centerline, gpsPoint, { units: "kilometers" });

        const stationAlongLineFeet = turf.convertLength(
          snapped.properties.location,
          "kilometers",
          "feet"
        );

        const displayedStationFeet = START_STATION_FEET + stationAlongLineFeet;

        const offsetFeet = turf.convertLength(
          snapped.properties.dist,
          "kilometers",
          "feet"
        );

        let sideText = "Unknown";

        if (centerline.geometry.type === "LineString") {
          const lineCoords = centerline.geometry.coordinates;
          const snappedIndex = snapped.properties.index ?? 0;
          const segment = getSegmentForSnap(lineCoords, snappedIndex);

          if (segment) {
            sideText = getSideOfSegment(segment[0], segment[1], [lon, lat]);
          }
        } else if (centerline.geometry.type === "MultiLineString") {
          const multiIndex = snapped.properties.multiFeatureIndex ?? 0;
          const lineCoords = centerline.geometry.coordinates[multiIndex];
          const snappedIndex = snapped.properties.index ?? 0;
          const segment = getSegmentForSnap(lineCoords, snappedIndex);

          if (segment) {
            sideText = getSideOfSegment(segment[0], segment[1], [lon, lat]);
          }
        }

        document.getElementById("station").textContent = formatStation(displayedStationFeet);
        document.getElementById("offset").textContent = `${offsetFeet.toFixed(1)} ft`;
        document.getElementById("side").textContent = sideText;

        setStatus("GPS locked and station updated.");
      } catch (err) {
        setStatus(`Geometry error: ${err.message}`, false);
      }
    }

    function handleGpsError(error) {
      setStatus(`GPS error: ${error.message}`, false);
    }

    async function startApp() {
      try {
        centerline = await loadCenterline();
        document.getElementById("startStationDisplay").textContent = formatStation(START_STATION_FEET);
        setStatus("Centerline loaded. Waiting for GPS...");

        if (!navigator.geolocation) {
          setStatus("Geolocation is not supported on this device/browser.", false);
          return;
        }

        navigator.geolocation.watchPosition(updatePosition, handleGpsError, {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        });
      } catch (err) {
        setStatus(err.message, false);
      }
    }

    startApp();
  </script>
</body>
</html>
