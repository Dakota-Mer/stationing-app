<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stationing</title>

<style>
body {
  margin:0;
  font-family:Arial,sans-serif;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  width:100%;
  max-width:420px;
  background:#1b1b1b;
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

h1 {
  font-size:22px;
  margin:0;
}

.mode-btn {
  width:36px;
  height:36px;
  border-radius:8px;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:#2a2a2a;
  color:#fff;
}

.mode-btn.active {
  background:#4caf50;
}

.row { margin-bottom:14px; }
.label { font-size:13px; color:#bdbdbd; }
.value { font-size:28px; font-weight:bold; }
.small { font-size:16px; }

.status {
  margin-top:18px;
  padding:10px;
  background:#2a2a2a;
  border-radius:10px;
  font-size:14px;
}

.good { color:#7CFC98; }
.bad { color:#ff8e8e; }

select {
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
}
</style>
</head>

<body>
<div class="card">

<div class="header">
  <button id="fastBtn" class="mode-btn">🐇</button>
  <h1>Stationing</h1>
  <button id="slowBtn" class="mode-btn">🐌</button>
</div>

<div class="row">
  <div class="label">Project</div>
  <select id="projectSelect"></select>
</div>

<div class="row">
  <div class="label">Station</div>
  <div id="station" class="value">--+--</div>
</div>

<div class="row">
  <div class="label">Offset</div>
  <div id="offset" class="value">--.- ft</div>
</div>

<div class="row">
  <div class="label">Side</div>
  <div id="side" class="value small">--</div>
</div>

<div class="row">
  <div class="label">Start Station</div>
  <div id="startStationDisplay" class="value small">--</div>
</div>

<div class="row">
  <div class="label">GPS Accuracy</div>
  <div id="accuracy" class="value small">--</div>
</div>

<div id="status" class="status">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
<script>

// ================= PROJECTS =================
const PROJECTS = :contentReference[oaicite:0]{index=0}.split("const PROJECTS = ")[1].split("];")[0] + "]";

// ================= MODES =================
const MODES = {
  fast: {
    smoothing: 3,
    maxAccuracy: 15,
    maxJump: 120,
    maxSpeed: 120,
    maxStationJump: 150,
    maxOffsetSpike: 30
  },
  slow: {
    smoothing: 7,
    maxAccuracy: 10,
    maxJump: 50,
    maxSpeed: 35,
    maxStationJump: 60,
    maxOffsetSpike: 15
  }
};

let mode = localStorage.getItem("mode") || "slow";

// ================= STATE =================
let centerline = null;
let currentProjectIndex = Number(localStorage.getItem("project")) || 0;
let watchId = null;

let rawHistory = [];
let lastRaw = null;
let lastSnap = null;

// ================= UI =================
function setMode(newMode){
  mode = newMode;
  localStorage.setItem("mode", mode);
  document.getElementById("fastBtn").classList.toggle("active", mode==="fast");
  document.getElementById("slowBtn").classList.toggle("active", mode==="slow");
}

document.getElementById("fastBtn").onclick = ()=>setMode("fast");
document.getElementById("slowBtn").onclick = ()=>setMode("slow");

function formatStation(feet){
  let r=Math.round(feet);
  return `${Math.floor(r/100)}+${(r%100).toString().padStart(2,"0")}`;
}

function setStatus(msg,good=true){
  document.getElementById("status").innerHTML=
    good?`<span class="good">${msg}</span>`:`<span class="bad">${msg}</span>`;
}

// ================= LOAD =================
async function loadCenterline(){
  let p=PROJECTS[currentProjectIndex];
  let res=await fetch(p.file);
  let data=await res.json();

  centerline = data.type==="FeatureCollection"
    ? data.features.find(f=>f.geometry.type.includes("Line"))
    : data;
}

// ================= GPS =================
function updatePosition(pos){

  let cfg = MODES[mode];

  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;
  let acc=pos.coords.accuracy;
  let t=Date.now();

  let accFt = acc * 3.28084;
  document.getElementById("accuracy").textContent = `${accFt.toFixed(1)} ft`;

  if(acc > cfg.maxAccuracy) return;

  let pt = turf.point([lon,lat]);

  // ===== RAW REJECTION =====
  if(lastRaw){
    let dist = turf.distance(lastRaw.point, pt, {units:"feet"});
    let dt = (t - lastRaw.time)/1000;
    let speed = dist / dt;

    if(dist > cfg.maxJump || speed > cfg.maxSpeed){
      return;
    }
  }

  lastRaw = {point:pt,time:t};

  rawHistory.push({point:pt,acc});
  if(rawHistory.length > cfg.smoothing) rawHistory.shift();

  // ===== SMOOTH =====
  let sumLat=0,sumLon=0,sumW=0;
  rawHistory.forEach(p=>{
    let w = 1/(p.acc||1);
    sumLat += p.point.geometry.coordinates[1]*w;
    sumLon += p.point.geometry.coordinates[0]*w;
    sumW += w;
  });

  let smooth = turf.point([sumLon/sumW,sumLat/sumW]);

  // ===== SNAP =====
  let snap = turf.nearestPointOnLine(centerline, smooth,{units:"kilometers"});

  let station = turf.convertLength(snap.properties.location,"kilometers","feet")
    + PROJECTS[currentProjectIndex].startStationFeet;

  let offset = turf.convertLength(snap.properties.dist,"kilometers","feet");

  // ===== SNAP REJECTION =====
  if(lastSnap){
    if(Math.abs(station-lastSnap.station) > cfg.maxStationJump) return;
    if(Math.abs(offset-lastSnap.offset) > cfg.maxOffsetSpike) return;
  }

  lastSnap = {station,offset};

  document.getElementById("station").textContent = formatStation(station);
  document.getElementById("offset").textContent = offset.toFixed(1)+" ft";

  setStatus("GPS locked",true);
}

// ================= START =================
async function start(){

  setMode(mode);

  let select=document.getElementById("projectSelect");
  PROJECTS.forEach((p,i)=>{
    let o=document.createElement("option");
    o.value=i;o.textContent=p.name;
    select.appendChild(o);
  });

  select.value=currentProjectIndex;

  select.onchange=async function(){
    currentProjectIndex=Number(this.value);
    localStorage.setItem("project",currentProjectIndex);
    await loadCenterline();
  };

  await loadCenterline();

  navigator.geolocation.watchPosition(updatePosition,console.error,{
    enableHighAccuracy:true
  });
}

start();

</script>
</body>
</html>
