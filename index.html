<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stationing</title>
  <meta name="theme-color" content="#111111" />

  <style>
    @font-face {
      font-family: "AceBruno";
      src: url("BrunoAceSC-Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #111111;
      --card-bg: #1B1B1B;
      --title: #EA9C01;
      --large-text: #B8E8E1;
      --small-text: #1BB69F;
      --dropdown-accent: #106D5F;
      --icon-inactive: #D9D9D9;
      --icon-active: #16927F;
      --note-bg: #E8F8F5;
      --status-bg: #252525;
      --good: #1BB69F;
      --bad: #ff8e8e;
      --muted: #9d9d9d;
      --saved-card: #222222;
      --danger: #b65a5a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 18px 16px 28px;
    }

    .card {
      width: 100%;
      max-width: 410px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 18px 18px 22px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.42);
    }

    .titleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .title {
      flex: 1;
      text-align: center;
      margin: 0;
      white-space: nowrap;
      line-height: 1;
      font-family: "AceBruno", Arial, sans-serif;
      font-size: 33px;
      color: var(--title);
      letter-spacing: 0.1px;
      transform: scaleY(1.15);
      transform-origin: center;
    }

    .iconBtn {
      width: 42px;
      height: 42px;
      min-width: 42px;
      min-height: 42px;
      border-radius: 12px;
      border: 2px solid var(--icon-inactive);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }

    .iconBtn:active,
    .cameraBtn:active,
    .actionBtn:active,
    .savedDeleteBtn:active,
    .captureOverlayBtn:active {
      transform: scale(0.97);
    }

    .iconBtn.active {
      border-color: var(--icon-active);
      box-shadow: 0 0 0 1px rgba(22, 146, 127, 0.18);
    }

    .modeIcon {
      width: 18px;
      height: 18px;
      background-color: var(--icon-inactive);
      display: block;
      transition: background-color 0.15s ease;
      -webkit-mask-position: center;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-size: contain;
      mask-position: center;
      mask-repeat: no-repeat;
      mask-size: contain;
    }

    .iconBtn.active .modeIcon {
      background-color: var(--icon-active);
    }

    .modeIcon.rabbit {
      -webkit-mask-image: url("rabbit.svg");
      mask-image: url("rabbit.svg");
    }

    .modeIcon.snail {
      -webkit-mask-image: url("snail.svg");
      mask-image: url("snail.svg");
    }

    .row {
      margin-bottom: 12px;
    }

    .label {
      color: var(--small-text);
      font-size: 12px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid var(--dropdown-accent);
      border-radius: 18px;
      background: #2A2A2A;
      color: var(--large-text);
      font-size: 17px;
      padding: 17px 46px 17px 16px;
      outline: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--small-text) 50%),
        linear-gradient(135deg, var(--small-text) 50%, transparent 50%);
      background-position:
        calc(100% - 22px) calc(50% - 4px),
        calc(100% - 14px) calc(50% - 4px);
      background-size: 8px 8px, 8px 8px;
      background-repeat: no-repeat;
    }

    .topStats {
      display: grid;
      grid-template-columns: 1.2fr 0.75fr 1fr;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 28px;
      align-items: start;
    }

    .bottomStats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 18px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .stat.left {
      align-items: flex-start;
      text-align: left;
    }

    .stat.center {
      align-items: center;
      text-align: center;
    }

    .stat.sideStat,
    .stat.offsetStat {
      align-items: flex-start;
      text-align: left;
    }

    .bigValue {
      color: var(--large-text);
      font-size: 30px;
      font-weight: bold;
      line-height: 1.08;
      letter-spacing: 0.1px;
      word-break: break-word;
    }

    .mediumValue {
      color: var(--large-text);
      font-size: 17px;
      font-weight: normal;
      line-height: 1.2;
    }

    .noteWrap {
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 108px;
      border: none;
      border-radius: 12px;
      background: var(--note-bg);
      color: #4e5b60;
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.35;
      padding: 14px 14px;
      resize: vertical;
      outline: none;
      display: block;
    }

    textarea::placeholder {
      color: #9d9d9d;
    }

    .actionRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .actionBtn {
      min-height: 44px;
      border-radius: 12px;
      border: 2px solid var(--icon-active);
      background: transparent;
      color: var(--large-text);
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      padding: 10px 12px;
    }

    .actionBtn.primary {
      background: rgba(22, 146, 127, 0.13);
    }

    .cameraWrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .cameraBtn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 2px solid var(--icon-active);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.15s ease;
    }

    .cameraBtn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .cameraIcon {
      width: 20px;
      height: 20px;
      background-color: var(--icon-active);
      display: block;
      -webkit-mask-image: url("camera.svg");
      mask-image: url("camera.svg");
      -webkit-mask-position: center;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-size: contain;
      mask-position: center;
      mask-repeat: no-repeat;
      mask-size: contain;
    }

    .status {
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--status-bg);
      font-size: 14px;
      line-height: 1.35;
      color: var(--large-text);
      margin-bottom: 16px;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }

    .savedWrap {
      margin-top: 8px;
    }

    .savedHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .savedTitle {
      color: var(--small-text);
      font-size: 14px;
      font-weight: bold;
    }

    .savedMeta {
      color: var(--muted);
      font-size: 12px;
    }

    .savedEmpty {
      background: var(--saved-card);
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .savedList {
      display: grid;
      gap: 10px;
    }

    .savedItem {
      background: var(--saved-card);
      border-radius: 14px;
      padding: 12px;
      border: 1px solid #2b2b2b;
    }

    .savedTopRow {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .savedStation {
      color: var(--large-text);
      font-size: 17px;
      font-weight: bold;
      line-height: 1.2;
    }

    .savedDeleteBtn {
      border: 1px solid var(--danger);
      background: transparent;
      color: #ffb7b7;
      border-radius: 10px;
      font-size: 12px;
      padding: 7px 9px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .savedSubRow {
      color: var(--small-text);
      font-size: 12px;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .savedNote {
      color: var(--large-text);
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .savedNote.empty {
      color: var(--muted);
      font-style: italic;
    }

    .savedFooter {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .captureOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px;
    }

    .captureOverlay.open {
      display: flex;
    }

    .captureOverlayText {
      color: #B8E8E1;
      text-align: center;
      font-size: 14px;
      line-height: 1.35;
      max-width: 420px;
    }

    .capturePreviewWrap {
      max-width: min(94vw, 520px);
      max-height: 68vh;
      overflow: auto;
      border-radius: 18px;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.5);
    }

    .capturePreview {
      display: block;
      width: 100%;
      height: auto;
      background: #1B1B1B;
      border-radius: 18px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: default;
    }

    .captureOverlayActions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .captureOverlayBtn {
      border: 2px solid #16927F;
      background: transparent;
      color: #B8E8E1;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    @media (max-width: 390px) {
      .title {
        font-size: 30px;
      }

      .iconBtn {
        width: 40px;
        height: 40px;
        min-width: 40px;
        min-height: 40px;
      }

      .modeIcon {
        width: 17px;
        height: 17px;
      }

      .bigValue {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="titleRow">
      <button id="fastModeBtn" class="iconBtn" type="button" aria-label="Fast mode" title="Fast mode">
        <span class="modeIcon rabbit" aria-hidden="true"></span>
      </button>

      <h1 class="title">Stationing</h1>

      <button id="slowModeBtn" class="iconBtn" type="button" aria-label="Slow mode" title="Slow mode">
        <span class="modeIcon snail" aria-hidden="true"></span>
      </button>
    </div>

    <div class="row">
      <div class="label">Project:</div>
      <select id="projectSelect"></select>
    </div>

    <div class="topStats">
      <div class="stat left">
        <div class="label">Station</div>
        <div id="station" class="bigValue">--+--</div>
      </div>

      <div class="stat sideStat">
        <div class="label">Side</div>
        <div id="side" class="bigValue">--</div>
      </div>

      <div class="stat offsetStat">
        <div class="label">Offset</div>
        <div id="offset" class="bigValue">--.- ft</div>
      </div>
    </div>

    <div class="bottomStats">
      <div class="stat center">
        <div class="label">GPS Accuracy</div>
        <div id="accuracy" class="mediumValue">--</div>
      </div>

      <div class="stat center">
        <div class="label">Smoothing Points</div>
        <div id="smoothingCountDisplay" class="mediumValue">--</div>
      </div>
    </div>

    <div class="noteWrap">
      <textarea id="noteInput" placeholder="Add note"></textarea>
    </div>

    <div class="actionRow">
      <button id="savePointBtn" class="actionBtn primary" type="button">Save Point</button>
      <a class="actionBtn" href="/onboarding/">Help</a>
    </div>

    <div class="cameraWrap">
      <button id="captureBtn" class="cameraBtn" type="button" aria-label="Capture app card" title="Capture app card">
        <span class="cameraIcon" aria-hidden="true"></span>
      </button>
    </div>

    <div id="status" class="status good">Loading app...</div>

    <div class="savedWrap">
      <div class="savedHeader">
        <div class="savedTitle">Saved Points</div>
        <div id="savedMeta" class="savedMeta">0 saved</div>
      </div>

      <div id="savedEmpty" class="savedEmpty">No saved points yet.</div>
      <div id="savedList" class="savedList" hidden></div>
    </div>
  </div>

  <div id="captureOverlay" class="captureOverlay" aria-hidden="true">
    <div id="captureOverlayText" class="captureOverlayText"></div>
    <div class="capturePreviewWrap">
      <img id="capturePreview" class="capturePreview" alt="Captured card preview" />
    </div>
    <div class="captureOverlayActions">
      <button id="saveCaptureBtn" class="captureOverlayBtn" type="button">Save</button>
      <button id="closeCaptureBtn" class="captureOverlayBtn" type="button">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>

  <script>
    const PROJECTS = [
      { name: "Project 1", file: "project1.geojson", startStationFeet: 200 },
      { name: "sidewalk", file: "sidewalk.geojson", startStationFeet: 0 },
      { name: "Kings Gate", file: "kingsgate.geojson", startStationFeet: 1000 },
      { name: "Mcvoid", file: "mcvoid.geojson", startStationFeet: 812 },
      { name: "FM 3325", file: "3616-01-020.geojson", startStationFeet: 0 }
    ];

    const MODES = {
      fast: {
        label: "Fast",
        maxGpsAccuracyMeters: 20,
        smoothingPointCount: 3,
        maxJumpFeet: 180,
        maxSpeedFeetPerSecond: 160,
        maxStationJumpFeet: 220,
        maxOffsetSpikeFeet: 45,
        processIntervalMs: 350
      },
      slow: {
        label: "Slow",
        maxGpsAccuracyMeters: 10,
        smoothingPointCount: 6,
        maxJumpFeet: 75,
        maxSpeedFeetPerSecond: 55,
        maxStationJumpFeet: 85,
        maxOffsetSpikeFeet: 18,
        processIntervalMs: 800
      }
    };

    const PROJECT_STORAGE_KEY = "stationingAppSelectedProjectIndex";
    const MODE_STORAGE_KEY = "stationingAppTrackingMode";
    const DB_NAME = "stationingAppDB";
    const DB_VERSION = 1;
    const STORE_NAME = "savedPoints";

    const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    let currentProjectIndex = 0;
    let currentMode = "fast";
    let centerline = null;
    let watchId = null;
    let db = null;

    let recentGpsPoints = [];
    let lastAcceptedRawPoint = null;
    let lastAcceptedSnappedResult = null;
    let lastProcessedTimestamp = 0;
    let latestCaptureDataUrl = "";
    let latestLivePoint = null;

    const stationEl = document.getElementById("station");
    const offsetEl = document.getElementById("offset");
    const sideEl = document.getElementById("side");
    const accuracyEl = document.getElementById("accuracy");
    const smoothingCountEl = document.getElementById("smoothingCountDisplay");
    const statusEl = document.getElementById("status");
    const projectSelectEl = document.getElementById("projectSelect");
    const fastModeBtnEl = document.getElementById("fastModeBtn");
    const slowModeBtnEl = document.getElementById("slowModeBtn");
    const captureBtnEl = document.getElementById("captureBtn");
    const noteInputEl = document.getElementById("noteInput");
    const savePointBtnEl = document.getElementById("savePointBtn");
    const savedListEl = document.getElementById("savedList");
    const savedEmptyEl = document.getElementById("savedEmpty");
    const savedMetaEl = document.getElementById("savedMeta");

    const captureOverlayEl = document.getElementById("captureOverlay");
    const captureOverlayTextEl = document.getElementById("captureOverlayText");
    const capturePreviewEl = document.getElementById("capturePreview");
    const saveCaptureBtnEl = document.getElementById("saveCaptureBtn");
    const closeCaptureBtnEl = document.getElementById("closeCaptureBtn");

    function setStatus(message, isGood = true) {
      statusEl.textContent = message;
      statusEl.classList.toggle("good", !!isGood);
      statusEl.classList.toggle("bad", !isGood);
    }

    function formatStation(feet) {
      const rounded = Math.round(feet);
      const staHundreds = Math.floor(rounded / 100);
      const staRemainder = rounded % 100;
      return `${staHundreds.toString().padStart(2, "0")} + ${staRemainder.toString().padStart(2, "0")}`;
    }

    function metersToFeet(meters) {
      return meters * 3.28084;
    }

    function getCurrentProject() {
      return PROJECTS[currentProjectIndex];
    }

    function getCurrentModeSettings() {
      return MODES[currentMode];
    }

    function updateModeButtonStyles() {
      fastModeBtnEl.classList.toggle("active", currentMode === "fast");
      slowModeBtnEl.classList.toggle("active", currentMode === "slow");
    }

    function updateProjectInfoDisplay() {
      const modeSettings = getCurrentModeSettings();
      smoothingCountEl.textContent = `${recentGpsPoints.length}/${modeSettings.smoothingPointCount}`;
    }

    function resetDisplayedValues() {
      stationEl.textContent = "--+--";
      offsetEl.textContent = "--.- ft";
      sideEl.textContent = "--";
      accuracyEl.textContent = "--";
      latestLivePoint = null;
      updateProjectInfoDisplay();
    }

    function resetTrackingBuffers() {
      recentGpsPoints = [];
      lastAcceptedRawPoint = null;
      lastAcceptedSnappedResult = null;
      lastProcessedTimestamp = 0;
      latestLivePoint = null;
      updateProjectInfoDisplay();
    }

    function setMode(modeName) {
      if (!MODES[modeName]) return;
      currentMode = modeName;
      localStorage.setItem(MODE_STORAGE_KEY, currentMode);
      resetTrackingBuffers();
      updateModeButtonStyles();
      updateProjectInfoDisplay();

      if (centerline) {
        setStatus(`Switched to ${MODES[currentMode].label} mode. Waiting for fresh GPS points...`, true);
      }
    }

    function getSegmentForSnap(lineCoords, snappedIndex) {
      if (!lineCoords || lineCoords.length < 2) return null;

      if (snappedIndex >= 0 && snappedIndex < lineCoords.length - 1) {
        return [lineCoords[snappedIndex], lineCoords[snappedIndex + 1]];
      }

      if (snappedIndex >= lineCoords.length - 1) {
        return [lineCoords[lineCoords.length - 2], lineCoords[lineCoords.length - 1]];
      }

      return [lineCoords[0], lineCoords[1]];
    }

    function getSideOfSegment(segmentStart, segmentEnd, pointCoord) {
      const avgLat = ((segmentStart[1] + segmentEnd[1] + pointCoord[1]) / 3) * Math.PI / 180;
      const cosLat = Math.cos(avgLat);

      const ax = segmentStart[0] * cosLat;
      const ay = segmentStart[1];
      const bx = segmentEnd[0] * cosLat;
      const by = segmentEnd[1];
      const px = pointCoord[0] * cosLat;
      const py = pointCoord[1];

      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;

      const cross = (abx * apy) - (aby * apx);

      if (Math.abs(cross) < 1e-12) return "ON";
      return cross > 0 ? "LT" : "RT";
    }

    function getSideText(centerlineFeature, snapped, originalCoord) {
      let sideText = "--";

      if (centerlineFeature.geometry.type === "LineString") {
        const lineCoords = centerlineFeature.geometry.coordinates;
        const snappedIndex = snapped.properties.index ?? 0;
        const segment = getSegmentForSnap(lineCoords, snappedIndex);
        if (segment) sideText = getSideOfSegment(segment[0], segment[1], originalCoord);
      } else if (centerlineFeature.geometry.type === "MultiLineString") {
        const multiIndex = snapped.properties.multiFeatureIndex ?? 0;
        const lineCoords = centerlineFeature.geometry.coordinates[multiIndex];
        const snappedIndex = snapped.properties.index ?? 0;
        const segment = getSegmentForSnap(lineCoords, snappedIndex);
        if (segment) sideText = getSideOfSegment(segment[0], segment[1], originalCoord);
      }

      return sideText;
    }

    function addGpsPointToBuffer(pointData) {
      const modeSettings = getCurrentModeSettings();
      recentGpsPoints.push(pointData);

      if (recentGpsPoints.length > modeSettings.smoothingPointCount) {
        recentGpsPoints.shift();
      }

      updateProjectInfoDisplay();
    }

    function getSmoothedCoordinate() {
      if (recentGpsPoints.length === 0) return null;

      let weightedLonSum = 0;
      let weightedLatSum = 0;
      let totalWeight = 0;

      for (const pointData of recentGpsPoints) {
        const weight = 1 / Math.max(pointData.accuracyMeters, 0.1);
        weightedLonSum += pointData.lon * weight;
        weightedLatSum += pointData.lat * weight;
        totalWeight += weight;
      }

      return [
        weightedLonSum / totalWeight,
        weightedLatSum / totalWeight
      ];
    }

    async function loadCenterlineForCurrentProject() {
      const project = getCurrentProject();

      setStatus(`Loading ${project.name}...`, true);
      resetDisplayedValues();
      updateProjectInfoDisplay();

      const response = await fetch(project.file, { cache: "no-store" });

      if (!response.ok) {
        throw new Error(`Could not load ${project.file}`);
      }

      const data = await response.json();

      if (data.type === "FeatureCollection") {
        const lineFeature = data.features.find(f =>
          f.geometry && (f.geometry.type === "LineString" || f.geometry.type === "MultiLineString")
        );

        if (!lineFeature) {
          throw new Error(`No LineString or MultiLineString found in ${project.file}`);
        }

        centerline = lineFeature;
        resetTrackingBuffers();
        return;
      }

      if (
        data.type === "Feature" &&
        data.geometry &&
        (data.geometry.type === "LineString" || data.geometry.type === "MultiLineString")
      ) {
        centerline = data;
        resetTrackingBuffers();
        return;
      }

      throw new Error(`${project.file} must contain a LineString or MultiLineString`);
    }

    function rawPointShouldBeRejected(newPoint) {
      const modeSettings = getCurrentModeSettings();

      if (newPoint.accuracyMeters > modeSettings.maxGpsAccuracyMeters) {
        setStatus(
          `Waiting for better GPS accuracy. Current: ${metersToFeet(newPoint.accuracyMeters).toFixed(1)} ft`,
          false
        );
        return true;
      }

      if (!lastAcceptedRawPoint) return false;

      const previousPoint = turf.point([lastAcceptedRawPoint.lon, lastAcceptedRawPoint.lat]);
      const currentPoint = turf.point([newPoint.lon, newPoint.lat]);

      const distanceFeet = turf.distance(previousPoint, currentPoint, { units: "kilometers" }) * 3280.84;
      const elapsedSeconds = Math.max((newPoint.timestamp - lastAcceptedRawPoint.timestamp) / 1000, 0.001);
      const speedFeetPerSecond = distanceFeet / elapsedSeconds;

      if (distanceFeet > modeSettings.maxJumpFeet) {
        setStatus(`Rejected GPS outlier: jump too large (${distanceFeet.toFixed(1)} ft).`, false);
        return true;
      }

      if (speedFeetPerSecond > modeSettings.maxSpeedFeetPerSecond) {
        setStatus(`Rejected GPS outlier: speed too high (${speedFeetPerSecond.toFixed(1)} ft/s).`, false);
        return true;
      }

      return false;
    }

    function snappedResultShouldBeRejected(stationFeet, offsetFeet) {
      const modeSettings = getCurrentModeSettings();

      if (!lastAcceptedSnappedResult) return false;

      const stationJumpFeet = Math.abs(stationFeet - lastAcceptedSnappedResult.stationFeet);
      const offsetSpikeFeet = Math.abs(offsetFeet - lastAcceptedSnappedResult.offsetFeet);

      if (stationJumpFeet > modeSettings.maxStationJumpFeet) {
        setStatus(`Rejected snapped outlier: station jump too large (${stationJumpFeet.toFixed(1)} ft).`, false);
        return true;
      }

      if (offsetSpikeFeet > modeSettings.maxOffsetSpikeFeet) {
        setStatus(`Rejected snapped outlier: offset spike too large (${offsetSpikeFeet.toFixed(1)} ft).`, false);
        return true;
      }

      return false;
    }

    function updatePosition(position) {
      const modeSettings = getCurrentModeSettings();
      const now = Date.now();

      if (now - lastProcessedTimestamp < modeSettings.processIntervalMs) return;
      lastProcessedTimestamp = now;

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracyMeters = position.coords.accuracy;
      const timestamp = position.timestamp || now;

      accuracyEl.textContent = `${metersToFeet(accuracyMeters).toFixed(1)} ft`;

      if (!centerline) {
        setStatus("Centerline not loaded yet.", false);
        return;
      }

      const rawPointData = { lat, lon, accuracyMeters, timestamp };

      if (rawPointShouldBeRejected(rawPointData)) return;

      lastAcceptedRawPoint = rawPointData;
      addGpsPointToBuffer(rawPointData);

      const smoothedCoord = getSmoothedCoordinate();
      if (!smoothedCoord) {
        setStatus("Waiting for enough GPS points...", false);
        return;
      }

      try {
        const project = getCurrentProject();
        const smoothedPoint = turf.point(smoothedCoord);
        const snapped = turf.nearestPointOnLine(centerline, smoothedPoint, { units: "kilometers" });

        const stationAlongLineFeet = turf.convertLength(
          snapped.properties.location,
          "kilometers",
          "feet"
        );

        const displayedStationFeet = project.startStationFeet + stationAlongLineFeet;

        const offsetFeet = turf.convertLength(
          snapped.properties.dist,
          "kilometers",
          "feet"
        );

        if (snappedResultShouldBeRejected(displayedStationFeet, offsetFeet)) return;

        const sideText = getSideText(centerline, snapped, [smoothedCoord[0], smoothedCoord[1]]);

        lastAcceptedSnappedResult = {
          stationFeet: displayedStationFeet,
          offsetFeet
        };

        latestLivePoint = {
          project: project.name,
          projectFile: project.file,
          mode: currentMode,
          stationText: formatStation(displayedStationFeet),
          stationFeet: Number(displayedStationFeet.toFixed(2)),
          side: sideText,
          offsetText: `${offsetFeet.toFixed(2)} ft`,
          offsetFeet: Number(offsetFeet.toFixed(2)),
          accuracyFeet: Number(metersToFeet(accuracyMeters).toFixed(1)),
          lat: Number(smoothedCoord[1].toFixed(7)),
          lon: Number(smoothedCoord[0].toFixed(7)),
          note: noteInputEl.value.trim(),
          capturedAt: new Date().toISOString()
        };

        stationEl.textContent = latestLivePoint.stationText;
        offsetEl.textContent = latestLivePoint.offsetText;
        sideEl.textContent = latestLivePoint.side;
        updateProjectInfoDisplay();

        setStatus(`GPS locked on ${project.name} (${MODES[currentMode].label} mode).`, true);
      } catch (err) {
        setStatus(`Geometry error: ${err.message}`, false);
      }
    }

    function handleGpsError(error) {
      setStatus(`GPS error: ${error.message}`, false);
    }

    function startGpsWatch() {
      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported on this device/browser.", false);
        return;
      }

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      watchId = navigator.geolocation.watchPosition(updatePosition, handleGpsError, {
        enableHighAccuracy: true,
        maximumAge: 1500,
        timeout: 10000
      });
    }

    function openCaptureOverlay(dataUrl) {
      latestCaptureDataUrl = dataUrl;
      capturePreviewEl.src = dataUrl;

      if (IS_IOS) {
        captureOverlayTextEl.textContent = "Press and hold the image, then tap Save to Photos.";
        saveCaptureBtnEl.textContent = "Open Image";
      } else {
        captureOverlayTextEl.textContent = "Preview generated. Use Save to download the PNG.";
        saveCaptureBtnEl.textContent = "Save";
      }

      captureOverlayEl.classList.add("open");
      captureOverlayEl.setAttribute("aria-hidden", "false");
    }

    function closeCaptureOverlay() {
      captureOverlayEl.classList.remove("open");
      captureOverlayEl.setAttribute("aria-hidden", "true");
    }

    function triggerDownloadFromDataUrl(dataUrl, filename) {
      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = filename;
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function roundRectPath(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function fillRoundRect(ctx, x, y, width, height, radius, color) {
      ctx.save();
      roundRectPath(ctx, x, y, width, height, radius);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }

    function strokeRoundRect(ctx, x, y, width, height, radius, color, lineWidth = 1) {
      ctx.save();
      roundRectPath(ctx, x, y, width, height, radius);
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.stroke();
      ctx.restore();
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const rawText = String(text || "").replace(/\r/g, "");
      const paragraphs = rawText.split("\n");
      const lines = [];

      for (const paragraph of paragraphs) {
        const words = paragraph.split(/\s+/).filter(Boolean);

        if (words.length === 0) {
          lines.push("");
          continue;
        }

        let line = words[0];

        for (let i = 1; i < words.length; i++) {
          const testLine = line + " " + words[i];
          if (ctx.measureText(testLine).width <= maxWidth) {
            line = testLine;
          } else {
            lines.push(line);
            line = words[i];
          }
        }

        lines.push(line);
      }

      const finalLines = lines.slice(0, maxLines);
      if (lines.length > maxLines && finalLines.length > 0) {
        let last = finalLines[finalLines.length - 1];
        while (ctx.measureText(last + "…").width > maxWidth && last.length > 0) {
          last = last.slice(0, -1);
        }
        finalLines[finalLines.length - 1] = last + "…";
      }

      for (let i = 0; i < finalLines.length; i++) {
        ctx.fillText(finalLines[i], x, y + i * lineHeight);
      }
    }

    function renderCaptureCanvas() {
      const width = 860;
      const height = 1280;
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      if (!ctx) {
        throw new Error("Could not create canvas context.");
      }

      ctx.fillStyle = "#111111";
      ctx.fillRect(0, 0, width, height);

      const cardX = 70;
      const cardY = 70;
      const cardW = width - 140;
      const cardH = height - 140;
      const pad = 36;

      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.42)";
      ctx.shadowBlur = 40;
      ctx.shadowOffsetY = 12;
      fillRoundRect(ctx, cardX, cardY, cardW, cardH, 36, "#1B1B1B");
      ctx.restore();

      const innerX = cardX + pad;
      const innerW = cardW - pad * 2;
      let y = cardY + 38;

      const btnSize = 64;
      const btnRadius = 18;

      function drawModeButton(x, yPos, label, isActive) {
        strokeRoundRect(ctx, x, yPos, btnSize, btnSize, btnRadius, isActive ? "#16927F" : "#D9D9D9", 4);
        ctx.fillStyle = isActive ? "#16927F" : "#D9D9D9";
        ctx.font = "700 20px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, x + btnSize / 2, yPos + btnSize / 2 + 1);
      }

      drawModeButton(innerX, y, "F", currentMode === "fast");
      drawModeButton(cardX + cardW - pad - btnSize, y, "S", currentMode === "slow");

      ctx.fillStyle = "#EA9C01";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.font = "700 52px Arial";
      ctx.fillText("Stationing", cardX + cardW / 2, y + 47);

      y += 92;

      ctx.fillStyle = "#1BB69F";
      ctx.textAlign = "left";
      ctx.font = "400 23px Arial";
      ctx.fillText("Project:", innerX, y);

      y += 16;

      fillRoundRect(ctx, innerX, y, innerW, 74, 24, "#2A2A2A");
      strokeRoundRect(ctx, innerX, y, innerW, 74, 24, "#106D5F", 4);

      ctx.fillStyle = "#B8E8E1";
      ctx.font = "400 31px Arial";
      ctx.textBaseline = "middle";
      const projectName = projectSelectEl.options[projectSelectEl.selectedIndex]?.text || getCurrentProject().name;
      ctx.fillText(projectName, innerX + 22, y + 37);

      ctx.strokeStyle = "#1BB69F";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(innerX + innerW - 34, y + 29);
      ctx.lineTo(innerX + innerW - 22, y + 43);
      ctx.lineTo(innerX + innerW - 10, y + 29);
      ctx.stroke();

      y += 126;

      const col1X = innerX;
      const col2X = innerX + innerW * 0.48;
      const col3X = innerX + innerW * 0.73;

      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#1BB69F";
      ctx.font = "400 21px Arial";
      ctx.fillText("Station", col1X, y);
      ctx.fillText("Side", col2X, y);
      ctx.fillText("Offset", col3X, y);

      y += 54;

      ctx.fillStyle = "#B8E8E1";
      ctx.font = "700 56px Arial";
      ctx.fillText(stationEl.textContent || "--+--", col1X, y);

      ctx.textAlign = "left";
      ctx.fillText(sideEl.textContent || "--", col2X, y);
      ctx.fillText(offsetEl.textContent || "--.- ft", col3X, y);

      y += 92;

      const bottomCol1X = innerX + innerW * 0.18;
      const bottomCol2X = innerX + innerW * 0.68;

      ctx.fillStyle = "#1BB69F";
      ctx.font = "400 21px Arial";
      ctx.textAlign = "center";
      ctx.fillText("GPS Accuracy", bottomCol1X, y);
      ctx.fillText("Smoothing Points", bottomCol2X, y);

      y += 42;

      ctx.fillStyle = "#B8E8E1";
      ctx.font = "400 31px Arial";
      ctx.fillText(accuracyEl.textContent || "--", bottomCol1X, y);
      ctx.fillText(smoothingCountEl.textContent || "--", bottomCol2X, y);

      y += 34;

      const noteBoxY = y;
      const noteBoxH = 230;
      fillRoundRect(ctx, innerX, noteBoxY, innerW, noteBoxH, 18, "#E8F8F5");

      ctx.font = "400 25px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";

      const noteText = noteInputEl.value && noteInputEl.value.trim()
        ? noteInputEl.value
        : "Add note";

      ctx.fillStyle = noteInputEl.value && noteInputEl.value.trim() ? "#4e5b60" : "#9d9d9d";
      drawWrappedText(ctx, noteText, innerX + 20, noteBoxY + 18, innerW - 40, 34, 5);

      y = noteBoxY + noteBoxH + 34;

      const camSize = 68;
      const camX = cardX + cardW / 2 - camSize / 2;
      strokeRoundRect(ctx, camX, y, camSize, camSize, 18, "#16927F", 4);
      ctx.fillStyle = "#16927F";
      ctx.font = "700 22px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("CAM", camX + camSize / 2, y + camSize / 2 + 1);

      y += 104;

      fillRoundRect(ctx, innerX, y, innerW, 74, 20, "#252525");
      ctx.fillStyle = statusEl.classList.contains("bad") ? "#ff8e8e" : "#1BB69F";
      ctx.font = "400 23px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";

      const statusText = statusEl.textContent || "";
      drawWrappedText(ctx, statusText, innerX + 18, y + 18, innerW - 36, 28, 2);

      return canvas;
    }

    async function captureCard() {
      try {
        captureBtnEl.disabled = true;
        setStatus("Capturing card...", true);

        const canvas = renderCaptureCanvas();
        const dataUrl = canvas.toDataURL("image/png");

        if (!dataUrl || dataUrl === "data:,") {
          throw new Error("Could not generate image data.");
        }

        openCaptureOverlay(dataUrl);

        if (IS_IOS) {
          setStatus("Capture ready. Press and hold the preview image to save it.", true);
        } else {
          setStatus("Capture ready. Use Save to download the PNG.", true);
        }
      } catch (err) {
        setStatus(`Capture failed: ${err.message}`, false);
      } finally {
        captureBtnEl.disabled = false;
      }
    }

    function handleSaveCapture() {
      if (!latestCaptureDataUrl) return;

      if (IS_IOS) {
        const win = window.open();
        if (!win) {
          setStatus("Could not open image preview window.", false);
          return;
        }

        win.document.open();
        win.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Capture</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111111;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      -webkit-touch-callout: default;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <img src="${latestCaptureDataUrl}" alt="Capture">
</body>
</html>`);
        win.document.close();
        return;
      }

      triggerDownloadFromDataUrl(latestCaptureDataUrl, "stationing-card.png");
    }

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const database = event.target.result;

          if (!database.objectStoreNames.contains(STORE_NAME)) {
            const store = database.createObjectStore(STORE_NAME, {
              keyPath: "id",
              autoIncrement: true
            });
            store.createIndex("createdAt", "createdAt", { unique: false });
            store.createIndex("project", "project", { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("IndexedDB failed to open."));
      });
    }

    function getStore(mode = "readonly") {
      if (!db) throw new Error("Database not ready.");
      return db.transaction(STORE_NAME, mode).objectStore(STORE_NAME);
    }

    function addSavedPoint(point) {
      return new Promise((resolve, reject) => {
        const request = getStore("readwrite").add(point);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("Failed to save point."));
      });
    }

    function getAllSavedPoints() {
      return new Promise((resolve, reject) => {
        const request = getStore("readonly").getAll();
        request.onsuccess = () => {
          const items = Array.isArray(request.result) ? request.result : [];
          items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          resolve(items);
        };
        request.onerror = () => reject(request.error || new Error("Failed to load saved points."));
      });
    }

    function deleteSavedPoint(id) {
      return new Promise((resolve, reject) => {
        const request = getStore("readwrite").delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error || new Error("Failed to delete saved point."));
      });
    }

    function formatSavedDate(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString([], {
        year: "numeric",
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    async function refreshSavedPoints() {
      try {
        const points = await getAllSavedPoints();
        savedMetaEl.textContent = `${points.length} saved`;

        if (points.length === 0) {
          savedEmptyEl.hidden = false;
          savedListEl.hidden = true;
          savedListEl.innerHTML = "";
          return;
        }

        savedEmptyEl.hidden = true;
        savedListEl.hidden = false;
        savedListEl.innerHTML = "";

        for (const point of points) {
          const item = document.createElement("div");
          item.className = "savedItem";

          const topRow = document.createElement("div");
          topRow.className = "savedTopRow";

          const stationWrap = document.createElement("div");
          const station = document.createElement("div");
          station.className = "savedStation";
          station.textContent = `${point.stationText || "--+--"} ${point.side || "--"}`;

          const subRow = document.createElement("div");
          subRow.className = "savedSubRow";
          subRow.textContent = `${point.project || "Unknown Project"} • ${point.offsetText || "--.- ft"} • ${point.accuracyFeet ?? "--"} ft acc`;

          stationWrap.appendChild(station);
          stationWrap.appendChild(subRow);

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "savedDeleteBtn";
          deleteBtn.type = "button";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", async () => {
            try {
              await deleteSavedPoint(point.id);
              await refreshSavedPoints();
              setStatus("Saved point deleted.", true);
            } catch (err) {
              setStatus(`Delete failed: ${err.message}`, false);
            }
          });

          topRow.appendChild(stationWrap);
          topRow.appendChild(deleteBtn);

          const note = document.createElement("div");
          note.className = "savedNote" + (!point.note ? " empty" : "");
          note.textContent = point.note || "No note";

          const footer = document.createElement("div");
          footer.className = "savedFooter";
          footer.textContent = `Saved ${formatSavedDate(point.createdAt)} • ${point.lat ?? "--"}, ${point.lon ?? "--"}`;

          item.appendChild(topRow);
          item.appendChild(note);
          item.appendChild(footer);

          savedListEl.appendChild(item);
        }
      } catch (err) {
        setStatus(`Saved points error: ${err.message}`, false);
      }
    }

    async function handleSavePoint() {
      try {
        if (!latestLivePoint) {
          setStatus("No live station to save yet. Wait for GPS lock first.", false);
          return;
        }

        const note = noteInputEl.value.trim();

        const pointToSave = {
          ...latestLivePoint,
          note,
          createdAt: new Date().toISOString()
        };

        await addSavedPoint(pointToSave);
        await refreshSavedPoints();
        setStatus("Point saved locally on this device.", true);
      } catch (err) {
        setStatus(`Save failed: ${err.message}`, false);
      }
    }

    function buildProjectDropdown() {
      projectSelectEl.innerHTML = "";

      PROJECTS.forEach((project, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = project.name;
        projectSelectEl.appendChild(option);
      });

      if (currentProjectIndex < 0 || currentProjectIndex >= PROJECTS.length) {
        currentProjectIndex = 0;
      }

      projectSelectEl.value = String(currentProjectIndex);

      projectSelectEl.addEventListener("change", async function () {
        currentProjectIndex = Number(this.value);
        localStorage.setItem(PROJECT_STORAGE_KEY, String(currentProjectIndex));

        try {
          centerline = null;
          resetTrackingBuffers();
          resetDisplayedValues();
          updateProjectInfoDisplay();
          await loadCenterlineForCurrentProject();
          setStatus(`Loaded ${getCurrentProject().name}. Waiting for GPS update...`, true);
        } catch (err) {
          centerline = null;
          resetDisplayedValues();
          setStatus(err.message, false);
        }
      });
    }

    async function startApp() {
      try {
        if (typeof turf === "undefined") {
          throw new Error("Turf failed to load.");
        }

        if (!Array.isArray(PROJECTS) || PROJECTS.length === 0) {
          throw new Error("No projects configured in the PROJECTS list.");
        }

        db = await openDatabase();

        const savedProjectIndex = Number(localStorage.getItem(PROJECT_STORAGE_KEY));
        if (!Number.isNaN(savedProjectIndex) && savedProjectIndex >= 0 && savedProjectIndex < PROJECTS.length) {
          currentProjectIndex = savedProjectIndex;
        }

        const savedMode = localStorage.getItem(MODE_STORAGE_KEY);
        if (savedMode && MODES[savedMode]) {
          currentMode = savedMode;
        }

        fastModeBtnEl.addEventListener("click", () => setMode("fast"));
        slowModeBtnEl.addEventListener("click", () => setMode("slow"));
        captureBtnEl.addEventListener("click", captureCard);
        saveCaptureBtnEl.addEventListener("click", handleSaveCapture);
        closeCaptureBtnEl.addEventListener("click", closeCaptureOverlay);
        savePointBtnEl.addEventListener("click", handleSavePoint);

        captureOverlayEl.addEventListener("click", (e) => {
          if (e.target === captureOverlayEl) closeCaptureOverlay();
        });

        noteInputEl.addEventListener("input", () => {
          if (latestLivePoint) {
            latestLivePoint.note = noteInputEl.value.trim();
          }
        });

        updateModeButtonStyles();
        buildProjectDropdown();
        updateProjectInfoDisplay();
        await loadCenterlineForCurrentProject();
        await refreshSavedPoints();
        startGpsWatch();
        setStatus("App ready. Waiting for GPS...", true);
      } catch (err) {
        setStatus(err.message, false);
      }
    }

    startApp();
  </script>
</body>
</html>
